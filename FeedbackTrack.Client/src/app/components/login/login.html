<div class="auth-wrapper fade-in">
    <div class="auth-card">
        <!-- Exact Mockup Header inside card -->
        <div class="auth-header">
            <div class="auth-logo">
                <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none"
                    class="mockup-logo-icon">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="url(#logo-grad-auth)"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                    <defs>
                        <linearGradient id="logo-grad-auth" x1="0" y1="0" x2="24" y2="24"
                            gradientUnits="userSpaceOnUse">
                            <stop stop-color="#3b82f6" />
                            <stop offset="1" stop-color="#2dd4bf" />
                        </linearGradient>
                    </defs>
                </svg>
                TeamPulse
            </div>
            <div class="auth-tagline">Employee Feedback & Recognition System</div>
        </div>

        <div class="auth-single-column">
            <!-- ================= LOGIN COLUMN ================= -->
            <div class="auth-section login-section" *ngIf="!isRegistering">
                <h3 class="auth-title">Login</h3>

                <div *ngIf="errorMessage" class="error-msg text-center mb-3">
                    {{ errorMessage }}
                </div>

                <form (ngSubmit)="onLogin()">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" [(ngModel)]="email" name="email" required
                            placeholder="Enter your email" [class.input-error]="errorMessage && email.length === 0">
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" [(ngModel)]="password" name="password" required
                            placeholder="Enter your password"
                            [class.input-error]="errorMessage && password.length === 0">
                    </div>

                    <div class="form-group">
                        <label for="role">Select Role</label>
                        <select id="role" [(ngModel)]="selectedRole" name="role" required>
                            <option value="Employee">Employee (User)</option>
                            <option value="Manager">Manager</option>
                            <option value="Admin">Admin</option>
                        </select>
                    </div>

                    <div
                        style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                        <label class="remember-me"
                            style="display: flex; gap: 8px; align-items: center; cursor: pointer;">
                            <input type="checkbox" style="width: auto; margin: 0; outline: none; box-shadow: none;">
                            <span style="font-weight: 500; font-size: 0.85rem; color: var(--text-secondary);">Remember
                                Me</span>
                        </label>
                    </div>

                    <button type="submit" class="btn auth-btn login-btn" [disabled]="isLoading">
                        {{ isLoading ? 'Logging in...' : 'Log In' }}
                    </button>

                    <div class="auth-toggle-link">
                        New User? <a href="javascript:void(0)" (click)="toggleView()">Register</a>
                    </div>

                    <div class="text-right" style="margin-top: 12px; text-align: right;">
                        <a href="javascript:void(0)"
                            style="color: #3b82f6; text-decoration: none; font-size: 0.85rem; font-weight: 500;">Forgot
                            Password?</a>
                    </div>
                </form>
            </div>

        </div>

        <!-- ================= REGISTER COLUMN ================= -->
        <div class="auth-section register-section" *ngIf="isRegistering">
            <h3 class="auth-title">Register</h3>

            <div *ngIf="regErrorMessage" class="error-msg text-center mb-3">
                {{ regErrorMessage }}
            </div>

            <div *ngIf="regSuccessMessage" class="success-msg text-center mb-3"
                style="color: var(--success-color); background: #f0fdf4; border: 1px solid #bbf7d0; padding: 10px; border-radius: 6px; font-weight: 500;">
                {{ regSuccessMessage }}
            </div>

            <form (ngSubmit)="onRegister()">
                <div class="form-group">
                    <label for="regName">Full Name</label>
                    <input type="text" id="regName" [(ngModel)]="regUser.name" name="regName" required
                        placeholder="John Doe">
                </div>

                <div class="form-group">
                    <label for="regEmail">Email</label>
                    <input type="email" id="regEmail" [(ngModel)]="regUser.email" name="regEmail" required
                        placeholder="name@company.com" [class.input-error]="regEmailError">
                    <div *ngIf="regEmailError" class="error-msg-small">{{ regEmailError }}</div>
                </div>

                <div class="form-group">
                    <label for="regDepartment">Department</label>
                    <select id="regDepartment" [(ngModel)]="regUser.department" name="regDepartment" required>
                        <option *ngFor="let dept of departments" [value]="dept">{{ dept }}</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="regPassword">Password</label>
                    <input type="password" id="regPassword" [(ngModel)]="regUser.password" name="regPassword" required
                        placeholder="Create a strong password" [class.input-error]="regPasswordError">
                    <div *ngIf="regPasswordError" class="error-msg-small">{{ regPasswordError }}</div>
                </div>

                <div class="form-group">
                    <label for="regConfirmPassword">Confirm Password</label>
                    <input type="password" id="regConfirmPassword" [(ngModel)]="regUser.confirmPassword"
                        name="regConfirmPassword" required placeholder="Type password again"
                        [class.input-error]="regConfirmPasswordError">
                    <div *ngIf="regConfirmPasswordError" class="error-msg-small">{{ regConfirmPasswordError }}</div>
                </div>

                <div class="form-group">
                    <label for="regRole">Role</label>
                    <select id="regRole" [(ngModel)]="regUser.role" name="regRole" required>
                        <option value="Employee">Employee</option>
                        <option value="Manager">Manager</option>
                    </select>
                </div>

                <button type="submit" class="btn auth-btn register-btn" [disabled]="isRegLoading">
                    {{ isRegLoading ? 'Registering...' : 'Register' }}
                </button>

                <div class="auth-toggle-link">
                    Already have an account? <a href="javascript:void(0)" (click)="toggleView()">Back to Login</a>
                </div>
            </form>
        </div>
    </div>
</div>
