<div class="login-container">
    <div class="login-card fade-in">
        <div class="login-header">
            <h2 class="login-title">TeamPulse</h2>
            <div class="tagline" style="margin-bottom: 1.5rem;">Employee Recognition Platform</div>
            <p class="login-subtitle">Sign in to continue</p>
        </div>

        <div *ngIf="errorMessage" class="btn-danger"
            style="margin-bottom: 1.5rem; text-align: center; width: 100%; border-radius: 8px; padding: 10px;">
            {{ errorMessage }}
        </div>

        <form (ngSubmit)="onLogin()">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" [(ngModel)]="email" name="email" required placeholder="Enter your email">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" [(ngModel)]="password" name="password" required
                    placeholder="Enter your password">
            </div>

            <div class="form-group">
                <label for="role">Login As</label>
                <select id="role" [(ngModel)]="selectedRole" name="role" required>
                    <option value="Employee">User (Employee)</option>
                    <option value="Manager">Manager</option>
                    <option value="Admin">Admin</option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%;" [disabled]="isLoading">
                {{ isLoading ? 'Logging in...' : 'Login' }}
            </button>
        </form>

        <div style="margin-top: 2rem; text-align: center;">
            <p style="color: var(--text-muted); font-size: 0.9rem;">
                Don't have an account? <a routerLink="/register"
                    style="font-weight: 600; text-decoration: none;">Register</a>
            </p>
        </div>
    </div>
</div>
